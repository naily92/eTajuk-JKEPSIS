<!DOCTYPE html>
<html>
<head>
    <title>e-Tajuk@JKEPSIS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="header">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" class="logo">
        <h1>e-Tajuk@JKEPSIS</h1>
    </div>
    <form method="POST">
        <input type="text" name="keyword" placeholder="Masukkan kata kunci carian..." value="{{ keyword }}">
        <select name="tahun">
            <option value="">Semua Tahun</option>
            {% for y in years %}
                <option value="{{ y }}" {% if selected_year == y %}selected{% endif %}>{{ y }}</option>
            {% endfor %}
        </select>
        <button type="submit">Cari</button>
    </form>
    <div class="results">
        {% for row in results %}
            <div class="card">
                <h3>{{ row[0] }}</h3>
                <p><strong>Tahun:</strong> {{ row[1] }}</p>
                <p><strong>Abstrak:</strong> {{ row[2] }}</p>
                <p><strong>Penyelia:</strong> {{ row[3] }}</p>
                <p><strong>Pelajar:</strong> {{ row[4] }}</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
